app = 'jkanime-vue'
primary_region = 'scl'

[build]

[env]
  DJANGO_SETTINGS_MODULE = 'jkanime_vue.settings'
  PYTHONPATH = '/app'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512

[[mounts]]
  source = 'data'
  destination = '/data'
